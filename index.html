<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>The Chai Quiz</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,700;0,9..144,900;1,9..144,500&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; height: 100%; }
  body {
    font-family: "Nunito", system-ui, sans-serif;
    color: #3d2818;
    background:
      radial-gradient(circle at 15% 12%, #f6c25a44, transparent 50%),
      radial-gradient(circle at 85% 88%, #6a9a3a33, transparent 50%),
      #f5ead0;
    overflow: hidden;
    min-height: 100vh;
  }
  * { box-sizing: border-box; }
  ::selection { background: #e8702b; color: #fff; }

  #stage-wrap {
    position: fixed; inset: 0;
    display: grid; place-items: center;
    padding: 24px;
  }
  #stage {
    width: 1100px; height: 750px;
    position: relative;
    border-radius: 32px;
    overflow: hidden;
    border: 4px solid #3d2818;
    box-shadow: 0 12px 0 #3d2818, 0 30px 80px rgba(61,40,24,0.32);
    transform-origin: center center;
    background: #fff5e0;
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>

<div id="stage-wrap">
  <div id="stage"><div id="root" style="width:100%;height:100%;"></div></div>
</div>

<script src="quiz-data.js"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="helpers.jsx"></script>
<script type="text/babel" src="use-quiz.jsx"></script>
<script type="text/babel" src="variation-storybook.jsx"></script>

<script type="text/babel" data-presets="react">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "animSpeed": 1,
  "paletteIdx": 0
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = window.useTweaks(TWEAK_DEFAULTS);
  const { TweaksPanel, TweakSection, TweakSlider, TweakRadio } = window;

  return (
    <>
      <window.VariationStorybook animSpeed={tweaks.animSpeed} paletteIdx={tweaks.paletteIdx} />

      <TweaksPanel title="Tweaks">
        <TweakSection label="Palette">
          <TweakRadio label="Color"
            value={tweaks.paletteIdx}
            options={[
              { value: 0, label: 'Warm' },
              { value: 1, label: 'Deep' },
              { value: 2, label: 'Sunny' },
            ]}
            onChange={(v) => setTweak('paletteIdx', v)} />
        </TweakSection>
        <TweakSection label="Motion">
          <TweakSlider label="Anim speed" min={0.5} max={2.5} step={0.1} unit="×"
            value={tweaks.animSpeed} onChange={(v) => setTweak('animSpeed', v)} />
        </TweakSection>
        <div style={{ padding: '8px 14px 12px', fontSize: 12, opacity: 0.7, lineHeight: 1.5 }}>
          Question copy lives in <strong>quiz-data.js</strong>.
          Other directions still in <strong>Chai Quiz - canvas explorations.html</strong>.
        </div>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

// Scale the 1100×750 stage to fit the viewport — like a slide stage but for a
// single fixed-canvas prototype. Cap at 1 so we never blow up past native size.
function fit() {
  const stage = document.getElementById('stage');
  if (!stage) return;
  const pad = 32;
  const sx = (window.innerWidth - pad * 2) / 1100;
  const sy = (window.innerHeight - pad * 2) / 750;
  const s = Math.min(sx, sy, 1);
  stage.style.transform = `scale(${s})`;
}
window.addEventListener('resize', fit);
fit();
</script>

</body>
</html>
